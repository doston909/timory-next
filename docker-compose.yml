services:
  timory-next:
    container_name: timory-next
    restart: always
    image: node:20.10.0

    ports:
      - "4000:3000"

    environment:
     - PORT: 3000
     - OPENAI_API_KEY: ${OPENAI_API_KEY}

    volumes:
      - ./:/usr/src/timory-next

    working_dir: /usr/src/timory-next

    command: bash -c "yarn && yarn run build && yarn run start"

    networks:
      - client-network

networks:
  client-network:
    driver: bridge
